openapi: 3.1.0
info:
  title: EvadePlayer API
  version: 2.0.0
  description: |
    REST API for EvadePlayer ŌĆö an HLS streaming backend.

    ## Authentication

    **Upload** (`POST /videos/upload`) always requires `X-Service-Key` header.

    **Read** endpoints (`GET /videos`, `GET /videos/{id}`, `GET /videos/{id}/status`,
    `GET /videos/{id}/storyboard`, `GET /videos/{id}/segments`) are controlled by
    the `READ_PUBLIC` env variable:
    - `READ_PUBLIC=true` (default) ŌĆö publicly accessible, no auth needed
    - `READ_PUBLIC=false` ŌĆö `X-Service-Key` required

    The service key is configured via `SERVICE_KEY` env variable.

    ## HLS playback flow

    1. `GET /videos/{id}` ŌåÆ receive `manifest_url` (pre-signed, 4 h TTL)
    2. Player fetches `manifest_url` ŌåÆ `GET /hls-proxy/{videoID}/master.m3u8?token=ŌĆ”&expires=ŌĆ”`
    3. API rewrites the master manifest:
       - `EXT-X-MEDIA` audio/subtitle URIs ŌåÆ `/hls-proxy/{videoID}/audio/{n}/index.m3u8?ŌĆ”`
       - `EXT-X-STREAM-INF` video variant URIs ŌåÆ `/hls-proxy/{videoID}/{codec}/{quality}/index.m3u8?ŌĆ”`
       - `EXT-X-IMAGE-STREAM-INF` preview sprite URI ŌåÆ `/hls-proxy/{videoID}/images/index.m3u8?ŌĆ”`
       - `EXT-X-MAP` init segments ŌåÆ `/hls/{videoID}/{codec}/{quality}/init.mp4?ŌĆ”`
    4. Player fetches sub-manifests through `/hls-proxy/`, which rewrites segment URLs ŌåÆ `/hls/{videoID}/ŌĆ”`
    5. Segments are served by nginx directly from SeaweedFS; nginx validates
       the token via `GET /internal/validate-hls` before proxying.

    ## Segments

    An optional JSON file can be uploaded alongside the video as the `segments`
    multipart field. It maps arbitrary segment names to `{ start, end }` intervals
    (seconds). Useful for marking intros, credits, ad breaks, etc.

    ```json
    { "intro": { "start": 0, "end": 15 }, "credits": { "start": 3540, "end": 3600 } }
    ```

    Retrieve it later via `GET /videos/{id}/segments`.

    ## Multi-audio tracks and subtitles

    When the source file contains multiple audio tracks or text-based subtitle tracks,
    the transcoder extracts them automatically:

    - **Audio tracks** ŌĆö each track is encoded as a separate audio-only HLS stream at
      `audio/{typeIndex}/index.m3u8`. The master manifest lists them as
      `EXT-X-MEDIA:TYPE=AUDIO` renditions with `LANGUAGE` and `NAME` from the source.
    - **Subtitles** ŌĆö text-based tracks (SRT, SSA/ASS, etc.) are converted to WebVTT HLS
      streams at `subs/{typeIndex}/index.m3u8`. Bitmap codecs (PGS, DVDSUB) are skipped.

servers:
  - url: /api
    description: Current host via nginx (relative ŌĆö works from any deployment)
  - url: http://localhost:8000
    description: Direct API (Go service, no prefix)
  - url: http://localhost
    description: Via nginx (localhost)

tags:
  - name: Videos
    description: Video upload, retrieval and status
  - name: HLS
    description: HLS manifest proxy and signed segment delivery
  - name: Media
    description: Static media files served by nginx
  - name: Internal
    description: Internal endpoints used by nginx (not for clients)

components:
  securitySchemes:
    serviceKeyAuth:
      type: apiKey
      in: header
      name: X-Service-Key
      description: Static service key. Set via `SERVICE_KEY` env variable.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: video not found

    VideoStatus:
      type: string
      enum: [pending, processing, ready, failed]

    Segment:
      type: object
      required: [start, end]
      properties:
        start:
          type: number
          format: float
          description: Start time in seconds.
          example: 0
        end:
          type: number
          format: float
          description: End time in seconds.
          example: 15

    Segments:
      type: object
      description: |
        Free-form map of named time intervals. Keys are segment names (e.g. `intro`,
        `credits`, `ad`); values are `{ start, end }` in seconds.
      additionalProperties:
        $ref: '#/components/schemas/Segment'
      example:
        intro:
          start: 0
          end: 15
        credits:
          start: 3540
          end: 3600

    Video:
      type: object
      required: [id, status, progress, size_bytes, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/VideoStatus'
        progress:
          type: integer
          description: Transcoding progress 0ŌĆō100.
          example: 42
        duration:
          type: number
          format: float
          nullable: true
          description: Duration in seconds. Null until transcoding completes.
          example: 3723.5
        width:
          type: integer
          nullable: true
          description: Video width in pixels. Null until transcoding completes.
          example: 1920
        height:
          type: integer
          nullable: true
          description: Video height in pixels. Null until transcoding completes.
          example: 1080
        size_bytes:
          type: integer
          format: int64
          description: Original file size in bytes.
          example: 1073741824
        manifest_url:
          type: string
          nullable: true
          description: |
            Pre-signed HLS master manifest URL. Only present when `status=ready`.
            Token TTL is 4 hours.
          example: http://localhost/hls-proxy/a1b2c3d4.../master.m3u8?token=abc&expires=1700000000
        preview_url:
          type: string
          nullable: true
          description: Preview image URL. Only present when `status=ready`.
          example: http://localhost/thumbnails/a1b2c3d4.../preview.jpg
        error_message:
          type: string
          nullable: true
          description: Set when `status=failed`.
        segments:
          nullable: true
          description: Named time intervals uploaded alongside the video. Null if not provided.
          allOf:
            - $ref: '#/components/schemas/Segments'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VideoListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Video'
        total:
          type: integer
          description: Total number of videos (for pagination).

    UploadResponse:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/VideoStatus'

    StatusResponse:
      type: object
      required: [id, status, progress, updated_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/VideoStatus'
        progress:
          type: integer
          example: 42
        error_message:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    StoryboardCoords:
      type: object
      required: [x, y]
      properties:
        x:
          type: integer
          description: Horizontal offset within the sprite sheet, in pixels.
          example: 320
        y:
          type: integer
          description: Vertical offset within the sprite sheet, in pixels.
          example: 0

    StoryboardCue:
      type: object
      required: [url, start_time, end_time, width, height, coords]
      properties:
        url:
          type: string
          description: URL of the sprite sheet image.
          example: http://localhost/thumbnails/a1b2c3d4.../sprite.jpg
        start_time:
          type: number
          format: float
          description: Start of the interval in seconds.
          example: 10
        end_time:
          type: number
          format: float
          description: End of the interval in seconds. Clamped to video duration on last cue.
          example: 20
        width:
          type: integer
          description: Width of a single tile in pixels.
          example: 320
        height:
          type: integer
          description: Height of a single tile in pixels.
          example: 180
        coords:
          $ref: '#/components/schemas/StoryboardCoords'

paths:
  # ŌöĆŌöĆ Videos ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ

  /videos/upload:
    post:
      tags: [Videos]
      summary: Upload a video file
      description: |
        Accepts a multipart upload, stores the original in SeaweedFS, and enqueues
        a transcoding job. Responds immediately with `202 Accepted`.

        **Supported formats:** `.mp4`, `.mkv`, `.mov`, `.avi`, `.webm`, `.m4v`.

        **Max file size:** configured via `MAX_UPLOAD_SIZE_GB` (default 50 GB).

        **Segments** ŌĆö optionally attach a `segments` field (JSON file or raw JSON string)
        with named time intervals. Invalid JSON is rejected with `400`.
      security:
        - serviceKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Video file to upload.
                segments:
                  type: string
                  description: |
                    Optional JSON string (or file) mapping segment names to
                    `{ start, end }` intervals in seconds.
                  example: '{"intro":{"start":0,"end":15},"credits":{"start":3540,"end":3600}}'
      responses:
        '202':
          description: Accepted ŌĆö transcoding job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Missing file or unsupported format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid service key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: File exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Storage or queue error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos:
    get:
      tags: [Videos]
      summary: List videos
      description: |
        Returns a paginated list of videos. Public when `READ_PUBLIC=true` (default);
        requires `X-Service-Key` when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: Items per page (clamped to 1ŌĆō100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Video list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoListResponse'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}:
    get:
      tags: [Videos]
      summary: Get video details
      description: |
        Returns video metadata. When `status=ready`, includes a signed
        `manifest_url` (4 h TTL) and `preview_url`.

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Video metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}/status:
    get:
      tags: [Videos]
      summary: Poll transcoding status
      description: |
        Lightweight polling endpoint. Returns status, progress and error fields only.

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}/storyboard:
    get:
      tags: [Videos]
      summary: Get storyboard cues
      description: |
        Returns an array of storyboard cues for players that do not support the
        native HLS Image Stream (`EXT-X-IMAGE-STREAM-INF`).

        Each cue maps a time interval to a tile region within the sprite sheet at
        `/thumbnails/{videoID}/sprite.jpg`. The sprite is generated during transcoding
        with one frame per `SPRITE_INTERVAL_SECONDS` (default 10 s), tiled in a grid of
        `SPRITE_COLUMNS` columns (default 10) at `SPRITE_WIDTH`├Ś`SPRITE_HEIGHT` px
        (default 320├Ś180) per tile.

        Returns `404` if the video does not exist or has not yet reached `status=ready`.

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Array of storyboard cues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoryboardCue'
              example:
                - url: http://localhost/thumbnails/a1b2c3d4.../sprite.jpg
                  start_time: 0
                  end_time: 10
                  width: 320
                  height: 180
                  coords: { x: 0, y: 0 }
                - url: http://localhost/thumbnails/a1b2c3d4.../sprite.jpg
                  start_time: 10
                  end_time: 20
                  width: 320
                  height: 180
                  coords: { x: 320, y: 0 }
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found or not yet ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}/segments:
    get:
      tags: [Videos]
      summary: Get video segments
      description: |
        Returns the segments JSON that was uploaded alongside the video.
        Returns `404` if the video does not exist or was uploaded without segments.

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Segments map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segments'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found or no segments uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ŌöĆŌöĆ HLS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ

  /hls-proxy/{videoID}/{file}:
    get:
      tags: [HLS]
      summary: Serve HLS manifest
      description: |
        Fetches an HLS manifest from SeaweedFS, rewrites all embedded URLs to inject
        signed tokens, and returns the result.

        The following rewrites are applied:
        - **`EXT-X-MEDIA` URIs** (audio/subtitle sub-playlists) ŌåÆ `/hls-proxy/{videoID}/ŌĆ”`
        - **`EXT-X-STREAM-INF` variant URIs** (video quality playlists) ŌåÆ `/hls-proxy/{videoID}/ŌĆ”`
        - **`EXT-X-IMAGE-STREAM-INF` URI** (preview sprite playlist) ŌåÆ `/hls-proxy/{videoID}/images/index.m3u8?ŌĆ”`
        - **`EXT-X-MAP` URIs** (fMP4 init segments) ŌåÆ `/hls/{videoID}/ŌĆ”`
        - **Segment lines** (`.m4s`, `.jpg`, `.vtt`) ŌåÆ `/hls/{videoID}/ŌĆ”`

        The `manifest_url` returned by `GET /videos/{id}` is already signed ŌĆö
        pass it directly to the player.

        **`codec` filter** ŌĆö appending `&codec=h264` (or `h265`, `av1`) to `master.m3u8`
        limits the playlist to that codec's renditions. Falls back to the full playlist
        if no matching rendition exists.
      parameters:
        - name: videoID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: file
          in: path
          required: true
          schema:
            type: string
          description: |
            Relative path within the HLS tree.
            Examples: `master.m3u8`, `h264/360p/index.m3u8`, `audio/0/index.m3u8`, `images/index.m3u8`
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: HMAC-SHA256 token signed with `HLS_TOKEN_SECRET`
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: Unix timestamp after which the token is invalid
        - name: codec
          in: query
          required: false
          schema:
            type: string
            enum: [h264, h265, av1]
          description: Filter master playlist to a single codec (only for `master.m3u8`)
      responses:
        '200':
          description: HLS manifest
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
        '401':
          description: Token missing, invalid, or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Failed to fetch manifest from SeaweedFS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /hls/{videoID}/{path}:
    get:
      tags: [HLS]
      summary: Serve HLS segment or subtitle file
      description: |
        Serves raw HLS media files from SeaweedFS. Handled by nginx ŌĆö the API
        service itself does not process this path.

        nginx validates the token via `GET /internal/validate-hls` before proxying.
        Clients should not construct segment URLs manually; they are embedded in the
        rewritten manifests returned by `/hls-proxy/`.

        | File type | Example path |
        |---|---|
        | Video segment (fMP4) | `h264/720p/chunk001.m4s` |
        | fMP4 init segment | `h264/720p/init.mp4` |
        | Audio segment | `audio/0/chunk001.m4s` |
        | Image stream sprite | `images/sprite.jpg` |
        | Subtitle (WebVTT) | `subs/0/chunk001.vtt` |
      servers:
        - url: http://localhost
          description: Via nginx (port 80)
      parameters:
        - name: videoID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: HLS media or subtitle data
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            text/vtt:
              schema:
                type: string
                format: binary
        '401':
          description: Token missing, invalid, or expired

  # ŌöĆŌöĆ Media ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ

  /thumbnails/{videoID}/preview.jpg:
    get:
      tags: [Media]
      summary: Video preview image
      description: |
        A JPEG preview frame generated during transcoding. Public ŌĆö no token required.
        Served by nginx directly from SeaweedFS.
      servers:
        - url: http://localhost
          description: Via nginx (port 80)
      parameters:
        - name: videoID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: JPEG preview image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
        '404':
          description: Preview not yet generated or video does not exist

  /thumbnails/{videoID}/sprite.jpg:
    get:
      tags: [Media]
      summary: Preview sprite sheet
      description: |
        A JPEG sprite sheet with one frame every `SPRITE_INTERVAL_SECONDS` seconds
        (default 10 s), `SPRITE_COLUMNS` columns (default 10), at
        `SPRITE_WIDTH`├Ś`SPRITE_HEIGHT` px (default 320├Ś180) per tile.
        Generated during transcoding. Public ŌĆö no token required.
        Served by nginx directly from SeaweedFS.
      servers:
        - url: http://localhost
          description: Via nginx (port 80)
      parameters:
        - name: videoID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: JPEG sprite sheet
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
        '404':
          description: Sprite not yet generated or video does not exist


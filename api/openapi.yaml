  /healthz:
    get:
      tags: [Internal]
      summary: Health check
      description: Returns `{"status":"ok"}` if the API and Postgres are reachable.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '503':
          description: Postgres unreachable

  /health:
    get:
      tags: [Internal]
      summary: nginx health check
      description: Returns `ok`. Handled by nginx, not the API service.
      servers:
        - url: http://localhost
          description: Via nginx (port 80)
      responses:
        '200':
          description: Service is up
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /internal/validate-hls:
    get:
      tags: [Internal]
      summary: Validate HLS token (nginx subrequest)
      description: |
        Used exclusively by nginx via `auth_request` to validate tokens on HLS
        segment requests. Do not call this endpoint directly.
      parameters:
        - name: video_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Token valid
        '401':
          description: Token invalid or expired

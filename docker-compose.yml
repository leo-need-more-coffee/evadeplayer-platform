services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: master -mdir=/data -ip=seaweedfs-master -port=9333
    volumes:
      - seaweedfs_master:/data
    ports:
      - "${SEAWEEDFS_MASTER_PORT:-9333}:9333"

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    # SEAWEEDFS_VOLUME_PUBLICURL — the address clients (e.g. remote transcoder) use to reach this
    # volume node directly. For all-in-one set to "seaweedfs-volume:8080" (Docker-internal).
    # For main mode set to "<this-server-external-ip>:<SEAWEEDFS_VOLUME_PORT>" in .env.
    command: volume -mserver=seaweedfs-master:9333 -dir=/data -port=8080 -ip=seaweedfs-volume -publicUrl=${SEAWEEDFS_VOLUME_PUBLICURL:-seaweedfs-volume:8080}
    volumes:
      - seaweedfs_volume:/data
    ports:
      - "${SEAWEEDFS_VOLUME_PORT:-8080}:8080"
    depends_on:
      seaweedfs-master:
        condition: service_started

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: filer -master=seaweedfs-master:9333 -port=8888 -ip=seaweedfs-filer
    volumes:
      - seaweedfs_filer:/data
    ports:
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
    depends_on:
      seaweedfs-master:
        condition: service_started
      seaweedfs-volume:
        condition: service_started

  migrate:
    image: migrate/migrate:latest
    env_file: .env
    volumes:
      - ./migrations:/migrations
    command: ["-path=/migrations", "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - API_PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis:6379
      - SEAWEEDFS_FILER=http://seaweedfs-filer:8888
      - SEAWEEDFS_MASTER=http://seaweedfs-master:9333
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs-filer:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  transcoder:
    profiles: [transcoder]
    build:
      context: ./transcoder
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis:6379
      - SEAWEEDFS_FILER=http://seaweedfs-filer:8888
      - SEAWEEDFS_MASTER=http://seaweedfs-master:9333
    depends_on:
      redis:
        condition: service_healthy
      seaweedfs-filer:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  player:
    profiles: [player]
    build:
      context: .
      dockerfile: Dockerfile.player
      args:
        VITE_VIDEO_PROVIDER_HOST: ${PUBLIC_HOST}
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui
    restart: unless-stopped
    environment:
      URL: /api/openapi.yaml
      BASE_URL: /swagger

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
    depends_on:
      - api
      - seaweedfs-filer
      - swagger-ui

volumes:
  postgres_data:
  redis_data:
  seaweedfs_master:
  seaweedfs_volume:
  seaweedfs_filer:

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip off;

    upstream api {
        server api:8000;
    }

    upstream seaweed_filer {
        server seaweedfs-filer:8888;
    }

    upstream swagger_ui {
        server swagger-ui:8080;
    }

    map $uri $hls_content_type {
        default application/octet-stream;
        ~\.ts$ video/mp2t;
        ~\.(m4s|mp4)$ video/mp4;
        ~\.jpe?g$ image/jpeg;
        ~\.vtt$ text/vtt;
    }

    server {
        listen 80;
        server_name _;

        # API proxy (все /api/* → Go)
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_request_buffering off;
            client_max_body_size 0;
        }

        # HLS manifest proxy — Go переписывает URL и вставляет токены.
        # CORS выставляет сам API через CORSMiddleware — здесь не дублируем.
        location /hls-proxy/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # HLS segments — nginx напрямую в SeaweedFS, но сначала проверяем токен.
        # Поддерживаются: .ts, .m4s, init.mp4 и HLS image stream .jpg.
        # Путь: /hls/<videoID>/<codec>/<quality>/<file>?token=...&expires=...
        location ~ ^/hls/([^/]+)/(.+\.(ts|m4s|mp4|jpe?g|vtt))$ {
            # Сохраняем нужные переменные ДО auth_request.
            # nginx передаёт переменные, заданные set{}, в subrequest.
            set $hls_video_id $1;
            set $hls_token    $arg_token;
            set $hls_expires  $arg_expires;

            auth_request /internal/validate-hls-chunk;

            proxy_pass http://seaweed_filer/hls/$1/$2;
            proxy_set_header Host seaweedfs-filer;
            proxy_hide_header Content-Type;
            proxy_hide_header Access-Control-Allow-Origin;

            add_header Content-Type $hls_content_type always;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }

        # Внутренний эндпоинт валидации токена для чанков.
        # nginx передаёт video_id, token, expires через переменные.
        location = /internal/validate-hls-chunk {
            internal;
            # $hls_video_id, $hls_token, $hls_expires — из родительского location
            proxy_pass http://api/internal/validate-hls?video_id=$hls_video_id&token=$hls_token&expires=$hls_expires;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Thumbnails — публичные, без токена.
        location ~ ^/thumbnails/(.+)$ {
            proxy_pass http://seaweed_filer/thumbnails/$1;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Cache-Control "public, max-age=86400";
            add_header Access-Control-Allow-Origin "*";
        }

        location /swagger/ {
            proxy_pass http://swagger_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /player/ {
            resolver 127.0.0.11 valid=10s;
            set $player http://player;
            rewrite ^/player/(.*)$ /$1 break;
            proxy_pass $player;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
